name: Security analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions: {}

jobs:
  actions:
    name: Check GitHub Actions workflow files
    runs-on: ubuntu-latest

    permissions:
      security-events: write # To upload findings to GitHub Advanced Security.
      contents: read # To check out code.
      actions: read # To read workflow run info when uploading SARIF files.

    concurrency:
      group: security-actions
      cancel-in-progress: true

    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          persona: auditor
