name: Infrastructure deployment

on:
  push:
    branches: [main]
    paths:
      - infra/**
      - funcs/**
      - scripts/build_lambdas.sh
      - .github/workflows/infra-deploy.yml
  workflow_dispatch:

defaults:
  run:
    working-directory: ./infra

permissions: {}

jobs:
  plan:
    name: Plan infrastructure changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}

    permissions:
      contents: read # To check out code
      id-token: write # To communicate with AWS for credentials

    concurrency:
      group: infra-deploy
      cancel-in-progress: true

    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::685873929017:role/statistician-github-actions
          aws-region: us-east-1

      - name: Get AWS SSM parameters
        uses: dkershner6/aws-ssm-getparameters-action@4fcb4872421f387a6c43058473acc1b22443fe13 # v2.0.3
        with:
          parameterPairs: |
            /statistician/prod/gatekeeper/issuer-url = TF_VAR_gatekeeper_issuer_url,
            /statistician/prod/gatekeeper/client-id = TF_VAR_gatekeeper_statistician_client_id,
            /statistician/prod/tags = TF_VAR_tags

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~1.15.8"

      - name: Initialize Terraform
        run: terraform init

      - name: Validate infrastructure files
        run: terraform validate -no-color

      # Building is necessary for the planning step to succeed due to how Terraform runs things.
      - name: Build Lambda packages
        run: ../scripts/build_lambdas.sh

      - name: Generate plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -detailed-exitcode -out=tfplan
          exit_code=$?
          set -e
          if [[ $exit_code -eq 0 ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          elif [[ $exit_code -eq 2 ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            exit $exit_code
          fi

      - name: Upload plan to S3
        if: steps.plan.outputs.has_changes == 'true'
        run: |
          aws s3 cp tfplan s3://bsoyka-tfstate/statistician-tfplan
          aws s3 cp --recursive ../build s3://bsoyka-tfstate/statistician-tfplan-build

  apply:
    name: Apply infrastructure changes
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.has_changes == 'true'

    environment: prod
    permissions:
      contents: read # To check out code
      id-token: write # To communicate with AWS for credentials

    concurrency:
      group: infra-deploy
      cancel-in-progress: false

    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::685873929017:role/statistician-github-actions
          aws-region: us-east-1

      - name: Get AWS SSM parameters
        uses: dkershner6/aws-ssm-getparameters-action@4fcb4872421f387a6c43058473acc1b22443fe13 # v2.0.3
        with:
          parameterPairs: |
            /statistician/prod/gatekeeper/issuer-url = TF_VAR_gatekeeper_issuer_url,
            /statistician/prod/gatekeeper/client-id = TF_VAR_gatekeeper_statistician_client_id,
            /statistician/prod/tags = TF_VAR_tags

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~1.15.8"

      - name: Download plan from S3
        run: |
          aws s3 cp s3://bsoyka-tfstate/statistician-tfplan tfplan
          aws s3 cp --recursive s3://bsoyka-tfstate/statistician-tfplan-build ../build

      - name: Initialize Terraform
        run: terraform init

      - name: Apply plan
        run: terraform apply -no-color -auto-approve tfplan
