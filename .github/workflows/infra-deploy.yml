name: Infrastructure deployment

on:
  push:
    branches: [main]
    paths:
      - infra/**
      - funcs/**
      - .github/workflows/infra-deploy.yml
  workflow_dispatch:

defaults:
  run:
    working-directory: ./infra

permissions: {}

jobs:
  deploy:
    name: Deploy infrastructure
    runs-on: ubuntu-latest

    environment: main
    permissions:
      contents: read # For checking out code
      id-token: write # For requesting AWS credentials

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Show OIDC claims (debugging test)
        env:
          AUDIENCE: "sts.amazonaws.com"
        run: |
          TOKEN_JSON=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE")
          ID_TOKEN=$(echo "$TOKEN_JSON" | jq -r .value)
          echo "$ID_TOKEN" | awk -F. '{print $2}' | base64 -d 2>/dev/null | jq -r

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::685873929017:role/statistician-github-actions
          aws-region: us-east-1

      - name: Get AWS SSM parameters
        uses: dkershner6/aws-ssm-getparameters-action@v2
        with:
          parameterPairs: |
            /statistician/prod/gatekeeper/issuer-url = TF_VAR_gatekeeper_issuer_url,
            /statistician/prod/gatekeeper/client-id = TF_VAR_gatekeeper_statistician_client_id,
            /statistician/prod/tags = TF_VAR_tags

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.15.8"

      - name: Initialize Terraform
        run: terraform init

      - name: Validate infrastructure files
        run: terraform validate -no-color

      - name: Generate plan
        run: terraform plan -no-color

      - name: Apply plan
        run: terraform apply -no-color
